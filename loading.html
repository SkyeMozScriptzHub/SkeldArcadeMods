<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkeldGames</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #000;
    color: #fff;
    font-family: Arial;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box {
    width: 320px;
    text-align: center;
  }

  .title {
    font-size: 20px;
    margin-bottom: 10px;
  }

  .file {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    overflow: hidden;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: white;
    transition: width 0.35s ease;
  }

  .percent {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="box">
  <div class="title">Preparing download...</div>
  <div class="file" id="fileName">Loading...</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="percent" id="percent">0%</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");

  const fill = document.getElementById("fill");
  const percent = document.getElementById("percent");
  const fileName = document.getElementById("fileName");

  if (!file) {
    fileName.textContent = "Not Found";
  } else {
    fileName.textContent = file;

    // Fake instant progress animation
    let p = 0;

    const interval = setInterval(() => {
      p += 20;
      fill.style.width = p + "%";
      percent.textContent = p + "%";

      if (p >= 100) {
        clearInterval(interval);

        // instant download after fill
        window.location.replace(
          `/api/download?file=${encodeURIComponent(file)}`
        );
      }
    }, 30);
  }
</script>

</body>
</html>
