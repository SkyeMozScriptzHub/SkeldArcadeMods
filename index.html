<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkeldGames</title>

<style>
@font-face {
  font-family: "MainFont";
  src: url("/fonts/main.ttf") format("truetype");
}

body {
  margin: 0;
  height: 100vh;
  background: #000;
  color: #fff;
  font-family: Inter, Arial;
  overflow: hidden;
}

/* center UI */
.wrap {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* card */
.card {
  width: 500px;
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  text-align: center;
  backdrop-filter: blur(12px);
}

h1 {
  font-family: "MainFont";
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

/* tiny status */
.status {
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <h1>SkeldGames</h1>
    <div>You are in Main Page</div>

    <input id="input" placeholder="Type file name..." />
    <button onclick="go()">Find</button>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
const path = window.location.pathname.replace("/", "");
const status = document.getElementById("status");

// DIRECT MODE (auto download)
if (path) {
  status.innerText = "Preparing download...";

  setTimeout(() => {
    window.location.replace(
      `/api/download?file=${encodeURIComponent(path)}`
    );
  }, 200);
}

// MAIN PAGE MODE
function go() {
  const val = document.getElementById("input").value.trim();
  if (!val) return;

  window.location.href = `/${encodeURIComponent(val)}`;
}
</script>

</body>
</html>
